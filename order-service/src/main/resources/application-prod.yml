# Day 7 — PROD profile.
# Activated with SPRING_PROFILES_ACTIVE=prod (Render sets this on the deployed service). Merged
# ON TOP of application.yml, so it only states what differs in production.
# WHY a prod profile: in production we want quiet, lean logging (no SQL spam, no stack-trace
# leakage) and headroom on the limits — but the SAME jar and code path. Crucially, there are NO
# secrets here: the database URL/credentials still come from the environment (see below), so
# this file is safe to commit.
spring:
  jpa:
    # Never echo SQL in production — it's noise and a minor information leak.
    show-sql: false
  # No H2 console in production (and prod runs on PostgreSQL anyway).
  h2:
    console:
      enabled: false

  # Day 11: Redis in production comes entirely from the environment — no host/port is baked into
  # the jar. ${REDIS_HOST}/${REDIS_PORT} are supplied by the deploy platform (e.g. a managed Redis
  # add-on); the ":localhost"/":6379" defaults only apply if a var is missing, so a mis-provisioned
  # environment fails loudly against localhost rather than silently pointing somewhere wrong.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # The datasource is intentionally NOT set here. Production reads it from the environment,
  # exactly as wired in application.yml's comments:
  #   SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
  # Spring relaxed-binds those env vars onto spring.datasource.*, so no credentials live in
  # source control.

# Minimal logging: warnings and above for the framework, INFO for our own code. Keeps prod
# logs lean and avoids leaking query/parameter detail.
logging:
  level:
    root: WARN
    dev.dev48v.orderhub: INFO

# Day 18 — in production the inventory-service address comes ENTIRELY from the environment, never baked
# into the jar. ${INVENTORY_SERVICE_URL} is supplied by the deploy platform (e.g. an internal service DNS
# name like http://inventory-service:8081 in a container network); the default only applies if the var is
# missing, so a mis-provisioned environment fails loudly rather than silently calling the wrong host.
inventory:
  service:
    url: ${INVENTORY_SERVICE_URL:http://inventory-service:8081}

# Larger limits in production — real traffic can request bigger pages and quantities.
app:
  orders:
    max-quantity: 5000
    default-page-size: 20
    max-page-size: 200

  # Day 13: the real protective limit in production — tight enough to shield the database from a
  # single abusive client, generous enough for normal usage. 60 requests / minute per client. In a
  # multi-instance deploy this is enforced GLOBALLY because the buckets live in the shared Redis
  # (${REDIS_HOST}/${REDIS_PORT} above), not per node. Tune via APP_RATELIMIT_CAPACITY if needed.
  ratelimit:
    capacity: 60
    refill-period: 1m

# Day 14: a STEADIER breaker for production. A larger sliding window makes the failure rate
# statistically meaningful (one unlucky error can't trip it), a higher minimum defers evaluation
# until there's real traffic, and a longer OPEN cooldown gives a genuinely struggling downstream
# time to recover before we probe it again. The threshold stays at 50%.
resilience4j:
  circuitbreaker:
    instances:
      inventory:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5

  # Day 15: steadier retries in production. A longer base wait gives a struggling downstream real
  # recovery time between attempts; exponential backoff + jitter still spread the load so many
  # instances retrying at once don't re-synchronise into a spike.
  retry:
    instances:
      inventory:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2

  # Day 15: a more forgiving deadline in production — real network round-trips take longer than a
  # local stub, so 2s avoids cutting off calls that would have succeeded, while still bounding the wait.
  timelimiter:
    instances:
      inventory:
        timeout-duration: 2s

  # Day 15: a wider bulkhead in production to allow healthy throughput to the dependency, while still
  # bounding the blast radius if it slows down so it can't consume the whole thread pool.
  bulkhead:
    instances:
      inventory:
        max-concurrent-calls: 25
        max-wait-duration: 0
