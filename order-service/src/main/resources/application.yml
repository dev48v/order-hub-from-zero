spring:
  application:
    # Day 20 — the order service's Eureka SERVICE ID. Renamed from "order-hub" to "order-service" so its
    # registered name matches its module name and the convention of its peers (inventory-service,
    # api-gateway, eureka-server). This is the exact name the API gateway addresses in its route table:
    # `uri: lb://order-service`. "OrderHub" stays the name of the whole product; the service itself is
    # order-service. Nothing resolves this service by its old name, so the rename is self-contained.
    name: order-service

  # Day 21 — become a CONFIG CLIENT. At startup, fetch this service's configuration from the Spring
  # Cloud Config Server (port 8888) using the service name above: the server returns the shared
  # application.yml merged with order-service.yml, and those properties join this Environment BEFORE
  # the beans are created. That's how shared settings (the Eureka URL, org-wide props) live in ONE
  # place instead of being copy-pasted here. `optional:` is the safety net: if the config server isn't
  # running (tests, offline, a cold start before the server is up) the import is skipped silently and
  # the service boots on the local defaults below — so nothing here becomes a hard dependency on the
  # server being reachable.
  config:
    import: "optional:configserver:http://localhost:8888"

  # Day 7: profiles. This base file holds the settings shared by every environment; the
  # environment-specific overrides live in application-dev.yml and application-prod.yml.
  # We deliberately do NOT hardcode an active profile here — pick one at runtime via the
  # SPRING_PROFILES_ACTIVE environment variable (e.g. Render sets SPRING_PROFILES_ACTIVE=prod;
  # locally run with -Dspring.profiles.active=dev). With no profile set, only this base file
  # applies, which keeps the zero-config H2 boot working out of the box.

  # Day 2: persistence. Locally we default to H2, an in-memory SQL database that needs
  # zero setup — the app boots with a real JPA/Hibernate stack and a working "orders" table.
  #
  # In production (Render) the SAME jar reads its connection from the environment:
  #   SPRING_DATASOURCE_URL       e.g. jdbc:postgresql://<host>:5432/orderhub
  #   SPRING_DATASOURCE_USERNAME
  #   SPRING_DATASOURCE_PASSWORD
  # Spring Boot relaxed-binds those env vars onto spring.datasource.* and OVERRIDES the H2
  # defaults below automatically — so prod talks to PostgreSQL with no code or profile change.
  datasource:
    url: jdbc:h2:mem:orderhub;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # Day 3: Flyway now owns the schema. On startup it scans the classpath under
  # db/migration/, runs every V*.sql file in version order (V1, then V2, ...) that
  # hasn't been applied yet, and records each one in a flyway_schema_history table so
  # it never re-runs. This happens BEFORE Hibernate initialises, on BOTH H2 (local)
  # and PostgreSQL (prod) — the same migrations, the same order, everywhere.
  flyway:
    # On by default whenever flyway-core is on the classpath; set explicitly for clarity.
    enabled: true

  jpa:
    hibernate:
      # Flyway creates the tables now, so Hibernate must NOT touch the schema. "validate"
      # makes Hibernate only check that each entity maps onto the migrated tables/columns
      # and fail fast on any mismatch — it never creates or alters anything.
      ddl-auto: validate
    # Don't hold a DB session open for the whole web request — keep the persistence
    # boundary inside the service layer.
    open-in-view: false

  # H2's web console stays OFF — we talk to the DB only through the app.
  h2:
    console:
      enabled: false

  # Day 11: Redis — the cache backend behind @Cacheable/@CacheEvict. Spring Boot auto-configures a
  # Lettuce-based connection factory from these keys, and CacheConfig turns it into a RedisCacheManager.
  # These base defaults assume a Redis on localhost:6379 (a `docker run -p 6379:6379 redis:7` away).
  # The dev profile keeps localhost; the prod profile overrides host/port from the environment
  # (${REDIS_HOST} / ${REDIS_PORT}) so no infrastructure address is baked into the jar.
  # Note: Lettuce connects lazily, so the app still BOOTS with no Redis running — it only errors when
  # a cache read/write actually happens, which keeps the H2 dev boot friction-free until you cache.
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s

  # Day 25 — Kafka. Phase 4 makes OrderHub event-driven; order-service now PRODUCES an OrderPlaced event on
  # every order create. The broker ADDRESS is externalized (never baked into the jar): it resolves from the
  # KAFKA_BOOTSTRAP_SERVERS environment variable, falling back to the local docker-compose broker on
  # localhost:9092 for dev. KafkaProducerConfig reads this exact key to build the producer; the JSON value
  # serializer + timeouts are set there in code. (Lettuce-style: nothing connects at boot — the producer
  # only reaches the broker on the first publish, and the publisher tolerates a broker that isn't there.)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  # Day 18 — OpenFeign client tuning. A synchronous inter-service call MUST be bounded: without a read
  # timeout, a slow or hung inventory-service would tie up an order-service thread indefinitely. These
  # per-client timeouts (keyed by the @FeignClient name) cap how long we wait to CONNECT and to READ a
  # response; overrunning either surfaces as a FeignException, which the order flow turns into a 409. Use
  # `default` to set a fallback for all clients; the named block below overrides it for inventory-service.
  cloud:
    openfeign:
      client:
        config:
          inventory-service:
            connect-timeout: 2000   # ms to establish the TCP connection before giving up
            read-timeout: 3000      # ms to wait for the response once connected

    # Day 22 — Spring Cloud LoadBalancer tuning. The strategy itself (round-robin vs random) and the custom
    # instance-list supplier are wired in code (InventoryLoadBalancerConfig, bound to the inventory-service
    # client via @LoadBalancerClient); these are the runtime knobs for the health-check + caching pipeline.
    loadbalancer:
      # Health-check-based filtering: how the balancer decides an instance is still alive. Defaults probe
      # every 25s — we tighten it so a killed instance drops out of rotation quickly and the demo rebalances
      # fast. The `path.default` is the Actuator health endpoint every service already exposes.
      health-check:
        initial-delay: 0s
        interval: 5s
        path:
          default: /actuator/health
      # How long the resolved (discovered + health-checked) instance list is cached before it's refreshed,
      # so we don't re-hit discovery on every request. Short TTL keeps scale-up/scale-down visible quickly.
      cache:
        ttl: 5s
        capacity: 64
      # PER-SERVICE override block: settings under clients.<serviceId> apply only to that load-balanced client.
      # Here it documents that inventory-service uses these health-check settings explicitly; other clients
      # (were there any) would fall back to the defaults above. This is the per-service config the day calls for.
      clients:
        inventory-service:
          health-check:
            interval: 5s
            path:
              default: /actuator/health

server:
  # Day 20 — moved off 8080. That port is now owned by the api-gateway, the single public front door;
  # order-service sits BEHIND it on 8082 (inventory-service is on 8081). Clients no longer hit this port
  # directly — they go through the gateway, which discovers this service by name and forwards to it.
  port: 8082

# Day 19 — service discovery replaces the hardcoded inventory-service URL.
# On Day 18 this file carried `inventory.service.url: http://localhost:8081`, and the @FeignClient
# read it. That's gone: order-service now resolves "inventory-service" by NAME through the Eureka
# registry (@FeignClient(name = "inventory-service"), url dropped). The block below registers
# order-service itself and tells its Eureka client where the registry lives; the DiscoveryClient it
# provides is what Feign + Spring Cloud LoadBalancer use to turn the name into a live address per call.
# (The only place inventory.service.url still appears is the client TEST, which sets it to point Feign
# at a MockWebServer and bypass discovery — see InventoryServiceClientTest.)
eureka:
  # Day 21 — the registry address (eureka.client.service-url.defaultZone) is no longer HERE. It moved
  # to the config server's SHARED application.yml and is fetched at startup via spring.config.import
  # above — one shared line, one place, instead of the same URL copy-pasted into every service. (The
  # prod profile keeps a ${EUREKA_SERVER_URL} override for the deployed environment.) If the config
  # server is unreachable, Eureka's own built-in default — http://localhost:8761/eureka/ — applies, so
  # local/offline boot is byte-for-byte unchanged.
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Day 10: springdoc-openapi / Swagger UI.
# WHY here in the base file: the paths are part of the API contract and stay the same
# everywhere. The generated spec is served at /v3/api-docs and the interactive UI at
# /swagger-ui.html. We DISABLE both by default and only turn them back on in the dev
# profile (application-dev.yml). Rationale: prod (application-prod.yml) leaves these
# defaults untouched, so the docs are NOT exposed publicly on the deployed service —
# the spec describes the whole surface area and is more useful kept internal. Flip
# springdoc.api-docs.enabled / swagger-ui.enabled to true (or run with the dev profile)
# to browse it locally.
springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    operations-sorter: method

# Day 7: application-specific limits, bound type-safely onto OrderProperties
# (@ConfigurationProperties prefix = "app.orders"). These are the defaults; a profile
# file (application-dev.yml / application-prod.yml) or an environment variable
# (e.g. APP_ORDERS_MAXPAGESIZE=200) can override any of them without touching code.
app:
  orders:
    max-quantity: 1000      # largest quantity a single order may request
    default-page-size: 20   # page size used when the client doesn't ask for one
    max-page-size: 100      # hard ceiling on page size, whatever the client requests

    # Day 23 — a feature flag with a LOCAL default here, overridable centrally in the config repo
    # (config-server order-service.yml). RefreshableOrderConfig reads it under @RefreshScope, so flipping
    # it centrally + POST /actuator/refresh turns express checkout on/off on the running service — no
    # redeploy. StaticOrderConfig reads the same flag WITHOUT @RefreshScope, so it stays stale until a
    # restart — the two beans side by side are what /api/config shows.
    express-checkout-enabled: false

    # Day 23 — a SENSITIVE value that must never sit as plaintext in git. What is committed here is only a
    # PLACEHOLDER: `${SHIPPING_API_KEY:...}` resolves from the SHIPPING_API_KEY environment variable at
    # runtime (injected by the platform, never committed). When the var is absent — local dev, tests, CI —
    # it falls back to the clearly-labelled non-secret below, so the app still boots. The real key's value
    # therefore never appears in source control; only the reference to it does. (In production the fallback
    # would be dropped so a missing var fails loudly. Alternatives: Config Server `{cipher}` encryption, or
    # Vault / AWS Secrets Manager — see ShippingCredentials.)
    integrations:
      shipping-api-key: ${SHIPPING_API_KEY:local-dev-placeholder-not-a-real-secret}

  # Day 13: token-bucket rate limiting, bound onto RateLimitProperties (prefix "app.ratelimit").
  # capacity = bucket size (and max burst); refill-period = time to refill that many tokens, greedily.
  # So the defaults below mean "20 requests / minute per client (API key or IP)". Overridable per
  # profile or via env vars (APP_RATELIMIT_CAPACITY, APP_RATELIMIT_REFILLPERIOD). Buckets are stored
  # in Redis (distributed across instances) when Redis is reachable, else per-instance in memory.
  ratelimit:
    enabled: true
    capacity: 20
    refill-period: 1m

  # Day 16: idempotency keys, bound onto IdempotencyProperties (prefix "app.idempotency"). A client
  # sends the header named below on an unsafe POST; the FIRST request is processed and its response
  # remembered in Redis for `ttl`, so any repeat with the same key replays that response instead of
  # creating a duplicate. `lock-ttl` is the short life of the initial in-flight reservation (so a
  # crashed request can't wedge the key for the whole ttl). Overridable per profile / via env vars
  # (APP_IDEMPOTENCY_TTL, APP_IDEMPOTENCY_LOCKTTL). Entries live in the same Redis as the cache.
  idempotency:
    enabled: true
    header-name: Idempotency-Key
    ttl: 24h
    lock-ttl: 5m

# Day 22 — which client-side load-balancing STRATEGY the inventory-service client uses. Read by
# InventoryLoadBalancerConfig at startup: "round-robin" (default — fair, even rotation) or "random"
# (uniformly random pick). Flip it here (or via ORDERHUB_LOADBALANCER_STRATEGY) and restart to switch the
# balancer, no recompile. Not tied to a profile — it's the same in dev and prod unless overridden.
orderhub:
  loadbalancer:
    strategy: round-robin

  # Day 25 — event publishing, bound onto OrderEventProperties (prefix "orderhub.events").
  #   enabled — master switch for emitting domain events. On here so a real/local run publishes OrderPlaced
  #             after each order create; the order-placing integration tests flip it off (AbstractPostgresIT)
  #             so they stay hermetic and never reach for a broker.
  #   order-placed-topic — the topic the OrderPlaced event goes to. The broker auto-creates it on first use.
  events:
    enabled: true
    order-placed-topic: order-placed

  # Day 28 — the CHOREOGRAPHY SAGA, bound onto SagaEventProperties (prefix "orderhub.saga"). order-service is
  # now event-driven BOTH ways: besides publishing OrderPlaced (above), it CONSUMES the two result events the
  # other services emit and reacts — shipping the order or compensating it.
  #   enabled             — master switch for the two saga @KafkaListeners' autoStartup AND the result publisher.
  #                         On here so a real/local run drives the saga; the existing full-context tests flip it
  #                         off (AbstractPostgresIT / OrderRepositoryIT / ConfigRefreshAndSecretsTest) so no
  #                         consumer starts and the app boots without a broker, exactly as before Day 28.
  #   stock-events-topic  — SUBSCRIBE for inventory's StockReserved. Must match inventory.events.stock-events-topic.
  #   payment-events-topic — SUBSCRIBE for payment's PaymentProcessed. Must match payment.events.payment-events-topic.
  #   order-shipped-topic — PUBLISH OrderShipped here on the happy path (the "ship" step).
  #   order-cancelled-topic — PUBLISH OrderCancelled here to compensate; inventory-service releases stock off it.
  #   consumer-group-id   — order-service's OWN saga consumer group (distinct from the other services').
  saga:
    enabled: true
    stock-events-topic: inventory-events
    payment-events-topic: payment-events
    order-shipped-topic: order-shipped
    order-cancelled-topic: order-cancelled
    consumer-group-id: order-saga

  # Day 29 — the ORCHESTRATION saga, bound onto OrchestrationProperties (prefix "orderhub.orchestration"). This
  # is the ALTERNATIVE coordination style to Day 28's choreography (above): a central SagaOrchestrator that
  # issues explicit COMMANDS (saga-commands) and awaits explicit REPLIES (saga-replies), driving order →
  # inventory → payment → ship as one state machine and issuing compensation commands (ReleaseStock) in reverse
  # on failure.
  #   enabled           — master switch for the orchestrator's two @KafkaListeners' autoStartup AND the command
  #                       publisher. DEFAULTS OFF: choreography is the shipped default, so the orchestrator stays
  #                       dormant and the app boots unchanged. Flip this on (and orderhub.saga.enabled off) to
  #                       drive the SAME flow via a coordinator instead — the two patterns are mutually exclusive.
  #   order-placed-topic — SUBSCRIBE for OrderPlaced (the saga's trigger). Same topic order-service publishes to.
  #   commands-topic    — PUBLISH commands here; every participant subscribes (its own group) + handles its kinds.
  #   replies-topic     — SUBSCRIBE for participants' replies; the orchestrator is the sole consumer.
  #   consumer-group-id — the orchestrator's OWN group for BOTH its subscriptions, distinct from participants'.
  orchestration:
    enabled: false
    order-placed-topic: order-placed
    commands-topic: saga-commands
    replies-topic: saga-replies
    consumer-group-id: order-orchestrator

# Day 24 — INTER-SERVICE AUTHENTICATION (the CALLER's half). inventory-service now demands a shared
# service token on every /api/** call (its ServiceTokenAuthFilter returns 401 without one), so
# order-service must PRESENT that token on every outbound Feign request. ServiceTokenFeignInterceptor
# reads these two keys off ServiceAuthProperties and stamps the token on each call:
#   • header — must equal inventory-service's service.auth.header (X-Service-Token).
#   • token  — the SECRET. Per Day 23's rule it is NOT committed here: it resolves from the
#              ${SERVICE_TOKEN} environment variable at runtime and never sits plaintext in git. Both
#              services read the SAME ${SERVICE_TOKEN} var, so they agree on the token without either
#              one hardcoding it. The clearly-labelled default only applies locally when the var is
#              absent (dev/tests still boot); in production you'd drop it so a missing var fails loudly.
#              It MUST match inventory-service's default so a token-less local run of both still works.
service:
  auth:
    header: X-Service-Token
    token: ${SERVICE_TOKEN:local-dev-service-token-change-me}

# Day 14: Resilience4j circuit breaker for the "inventory" downstream (InventoryClient.checkStock,
# annotated @CircuitBreaker(name = "inventory")). The breaker watches recent call outcomes and, once
# too many fail, trips OPEN — short-circuiting every call straight to the fallback for a cooldown so
# the struggling dependency isn't hammered — then probes with a few HALF_OPEN trial calls before
# closing again. Every knob below is externalised so it can be retuned per profile / env var with no
# recompile. These are the shared defaults; the dev profile makes them snappy for demos, prod widens
# the window for statistical stability.
resilience4j:
  circuitbreaker:
    instances:
      inventory:
        # COUNT_BASED: the window is the last N calls (not a time span). Simple and deterministic —
        # the failure rate is computed over exactly the last `slidingWindowSize` completed calls.
        sliding-window-type: COUNT_BASED
        # The window is the last 10 calls. The breaker only starts EVALUATING the failure rate once
        # at least `minimumNumberOfCalls` have been recorded, so a couple of early failures on a cold
        # start don't trip it.
        sliding-window-size: 10
        minimum-number-of-calls: 5
        # Trip OPEN when 50% or more of the calls in the window failed. With size 10 that's 5+ of the
        # last 10 calls failing.
        failure-rate-threshold: 50
        # While OPEN, stay OPEN for this long, short-circuiting to the fallback, before moving to
        # HALF_OPEN to test the waters. Kept short here; the prod profile lengthens it.
        wait-duration-in-open-state: 10s
        # In HALF_OPEN, allow this many trial calls through. If enough of them succeed (per the same
        # failure-rate threshold) the breaker CLOSES; if they fail it goes back to OPEN.
        permitted-number-of-calls-in-half-open-state: 3
        # Move to HALF_OPEN automatically after the wait, without needing an incoming call to nudge it.
        automatic-transition-from-open-to-half-open-enabled: true
        # Count the stub's own failure (and, via the composition, a TimeoutException) as a breaker failure.
        record-exceptions:
          - dev.dev48v.orderhub.inventory.InventoryUnavailableException
          - java.util.concurrent.TimeoutException
        # Day 15: do NOT count these toward tripping the breaker. A 4xx-like bad request is the caller's
        # fault, not the dependency's; a full-bulkhead rejection is our own back-pressure, not the
        # dependency erroring. Counting either would wrongly push the breaker toward OPEN.
        ignore-exceptions:
          - dev.dev48v.orderhub.inventory.InvalidItemException
          - io.github.resilience4j.bulkhead.BulkheadFullException
        # Publish state-transition/call events to the Actuator event buffer so they're observable.
        register-health-indicator: true

  # Day 15: RETRY for the "inventory" downstream (InventoryClient.checkStockResilient, annotated
  # @Retry(name = "inventory")). A retry gives a TRANSIENT blip — a dropped packet, a brief 5xx, a
  # momentary timeout — a second (and third) chance before we give up and fall back. Two things make
  # it safe rather than a self-inflicted DDoS: (1) EXPONENTIAL BACKOFF + JITTER, so attempts spread out
  # in time instead of retrying in a tight, synchronised burst; (2) a RETRY-EXCEPTIONS allow-list, so
  # we only retry faults that a retry could actually fix (never a 4xx-style bad request). These are the
  # shared defaults; the dev profile shortens the waits for snappy demos, prod widens them.
  retry:
    instances:
      inventory:
        # Total attempts INCLUDING the first — so 3 means the original call + up to 2 retries.
        max-attempts: 3
        # The base gap before the first retry. Grows with the multiplier below.
        wait-duration: 300ms
        # EXPONENTIAL BACKOFF: each wait is the previous one × multiplier (300ms → 600ms → 1200ms...),
        # so a struggling dependency gets progressively more breathing room instead of a fixed drumbeat.
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        # JITTER: randomise each wait by ± this factor around the computed value. Without it, many
        # clients that failed at the same instant would all retry at the same instant — a "thundering
        # herd" that re-synchronises load spikes. Combined with exponential backoff, Resilience4j uses
        # an exponential-random interval function.
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        # ONLY these (transient) exceptions are retried. Anything else propagates immediately — a
        # malformed request (4xx-like InvalidItemException) is deterministic, so retrying it is pointless.
        retry-exceptions:
          - dev.dev48v.orderhub.inventory.InventoryUnavailableException
          - java.util.concurrent.TimeoutException
        # Never retry these. A 4xx-like InvalidItemException is deterministic. And because @Retry is the
        # OUTERMOST aspect, when the inner CircuitBreaker is OPEN each attempt raises CallNotPermittedException,
        # and when the inner Bulkhead is full it raises BulkheadFullException — retrying those just hammers a
        # component that's already saying "no". Ignoring them makes the composed call fail FAST to the fallback.
        ignore-exceptions:
          - dev.dev48v.orderhub.inventory.InvalidItemException
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
          - io.github.resilience4j.bulkhead.BulkheadFullException

  # Day 15: TIME LIMITER for the "inventory" downstream. A retry handles a call that FAILS; a time
  # limiter handles a call that HANGS — arguably worse, because a stuck call ties up a thread and a
  # connection indefinitely while the user stares at a spinner. It puts a hard DEADLINE on the async
  # call: if the CompletableFuture hasn't completed within timeout-duration, Resilience4j completes it
  # with a TimeoutException. That timeout is then a first-class outcome — @Retry retries it (it's in
  # retry-exceptions) and, because CircuitBreaker sits outside TimeLimiter, it counts toward tripping
  # the breaker, so a merely-SLOW dependency is treated as a failing one.
  timelimiter:
    instances:
      inventory:
        # A call that takes longer than this is abandoned and surfaced as a TimeoutException.
        timeout-duration: 1s
        # Interrupt the running future when the deadline fires, so the abandoned work doesn't keep
        # occupying a thread after we've already given up on its result.
        cancel-running-future: true

  # Day 15: BULKHEAD for the "inventory" downstream — the ship-hull metaphor: compartmentalise so one
  # flooded section can't sink the vessel. It caps how many calls to this ONE dependency may be in
  # flight at once. WHY it matters: if inventory-service goes slow, without a bulkhead every incoming
  # request piles up waiting on it, and eventually the whole app's thread pool is exhausted — a problem
  # in one dependency becomes total unavailability. With a semaphore bulkhead, only max-concurrent-calls
  # threads can be stuck on inventory; the (N+1)th call is rejected immediately with BulkheadFullException
  # (→ fallback), leaving threads free to serve everything else. This is the SEMAPHORE type: a simple
  # permit count on the caller's own thread (as opposed to the THREADPOOL type, which hands work to a
  # separate, bounded pool). max-wait-duration 0 = fail fast when full rather than queueing.
  bulkhead:
    instances:
      inventory:
        max-concurrent-calls: 8
        max-wait-duration: 0

# Day 14: expose just enough Actuator to OBSERVE the breaker without opening the whole management
# surface. `health` (with the Resilience4j circuit-breaker health indicator shown in full) and
# `circuitbreakers` / `circuitbreakerevents` (the state + a rolling event stream). Everything else
# stays off by default — same conservative posture as the OpenAPI docs.
management:
  endpoints:
    web:
      exposure:
        # Day 23 — add `refresh` (the Spring Cloud endpoint that rebuilds the Environment from the config
        # server and re-creates every @RefreshScope bean, so a config change is adopted with NO restart)
        # and `env` (browse the resolved property hierarchy; Actuator auto-sanitises keys that look like
        # secrets — password/key/token/etc. — to ****** so a secret is never echoed even here).
        include: health, circuitbreakers, circuitbreakerevents, refresh, env
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
