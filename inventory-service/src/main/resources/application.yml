# Day 17 — the Inventory service's OWN configuration, separate from order-service's.
# Each microservice has its own config file, its own name, and its own port. That independence is
# the point: the two apps boot as two processes and never share a config surface.
spring:
  application:
    # Day 19 — this is now the SERVICE ID under which inventory-service registers in Eureka. It's the
    # exact name order-service resolves against: @FeignClient(name = "inventory-service"). The logical
    # name replaces the hardcoded host:port entirely — callers ask the registry for "inventory-service"
    # and get back whichever instances are live right now.
    name: inventory-service

  # Day 21 — become a CONFIG CLIENT. At startup, fetch this service's configuration from the Spring
  # Cloud Config Server (port 8888) using the service name above: the server returns the shared
  # application.yml merged with inventory-service.yml, and those properties join this Environment
  # BEFORE the beans are created — so shared settings (the Eureka URL, org-wide props) live in ONE
  # place instead of being copy-pasted here. `optional:` is the safety net: if the config server isn't
  # running (tests, offline) the import is skipped silently and the service boots on its local defaults.
  config:
    import: "optional:configserver:http://localhost:8888"

  # Day 26 — Kafka (the CONSUMER side). inventory-service now SUBSCRIBES to the order-placed topic that
  # order-service publishes to, and reserves stock on each OrderPlaced. The broker ADDRESS is externalized
  # exactly like the producer (never baked into the jar): it resolves from the KAFKA_BOOTSTRAP_SERVERS
  # environment variable, falling back to the local docker-compose broker on localhost:9092 for dev.
  # KafkaConsumerConfig reads this exact key to build the consumer; the JSON value deserializer + the
  # trusted-package allow-list are set there in code. Nothing connects at boot unless the listener starts.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  # Day 32 — persistence for the EXACTLY-ONCE consumer (see orderhub.exactly-once below). Inventory was
  # in-memory through Day 31; the exactly-once path needs a real DB so the stock reservation and the
  # processed-message dedup marker can commit in ONE local transaction. Local/dev/tests run on an in-memory
  # H2 (no Docker, no external DB); production points these at a real server via env vars, exactly like
  # order-service. When orderhub.exactly-once.enabled=false (the default), this DB simply initialises and
  # sits idle — the Day-26 in-memory listener remains the only consumer, so behaviour is unchanged.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:inventory;DB_CLOSE_DELAY=-1}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  # Flyway OWNS the schema: on startup it runs db/migration/V*.sql in order and records each in
  # flyway_schema_history so it never re-runs — the same tables on H2 and PostgreSQL.
  flyway:
    enabled: true

  jpa:
    hibernate:
      # Flyway creates the tables, so Hibernate must NOT touch the schema — "validate" only checks the
      # entities map onto the migrated tables/columns and fails fast on any mismatch.
      ddl-auto: validate
    # Keep the persistence boundary inside the service/processor layer, not the whole request.
    open-in-view: false

  # H2's web console stays off — the app talks to the DB only through JPA.
  h2:
    console:
      enabled: false

server:
  # Each service takes its own local port so they can all run on one machine: the api-gateway (the
  # public front door) owns 8080, inventory-service takes 8081, order-service sits on 8082. In a
  # container/K8s world each gets its own network identity instead.
  port: 8081

# Day 19 — register with the Eureka service registry.
# On startup the Eureka client POSTs this instance (its host + port + the app name above) to the
# server, then sends a heartbeat every ~30s to keep the lease alive. If the heartbeats stop (crash,
# kill), the lease expires and the server evicts the instance, so callers stop being handed a dead
# address. This is what lets order-service drop the hardcoded inventory.service.url and resolve us by
# NAME instead.
eureka:
  # Day 21 — the registry address (eureka.client.service-url.defaultZone) is no longer HERE. It moved
  # to the config server's SHARED application.yml and is fetched at startup via spring.config.import
  # above — one shared line for the whole system instead of the same URL duplicated in every service.
  # If the config server is unreachable, Eureka's built-in default (http://localhost:8761/eureka/)
  # applies, so local/offline boot is unchanged.
  instance:
    # Register by IP rather than hostname — more robust across dev machines / containers where
    # hostname resolution is unreliable. The instance id keeps the app name + port readable in the
    # dashboard even when several instances of this service run behind the one name.
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Day 24 — INTER-SERVICE AUTHENTICATION. inventory-service no longer trusts every caller that can reach
# it: ServiceTokenAuthFilter requires a shared service token on the header below for any /api/** call and
# rejects the rest with 401. The token is a SECRET, so — per Day 23's rule — it is NOT committed here: it
# is resolved from the ${SERVICE_TOKEN} environment variable at runtime, injected by the platform and
# never in git. The clearly-labelled default only applies locally when the var is absent, so dev/tests
# still boot; in production you'd drop the default so a missing var fails loudly. order-service (its Feign
# client) and the api-gateway present this SAME token, sourced from the SAME ${SERVICE_TOKEN} var, so the
# whole system shares one secret without any of them hardcoding it. NOTE: /actuator/health stays OPEN
# (the filter guards only /api/*) so Day 22's load-balancer health probes keep working.
service:
  auth:
    enabled: true
    header: X-Service-Token
    token: ${SERVICE_TOKEN:local-dev-service-token-change-me}

# Day 26 — event CONSUMPTION, bound onto InventoryEventProperties (prefix "inventory.events").
# Day 28 — inventory-service is now event-driven BOTH ways: it still consumes OrderPlaced, but it also
# ANSWERS with StockReserved and REACTS to the saga's compensating OrderCancelled.
#   enabled              — master switch driving BOTH @KafkaListeners' autoStartup AND the StockReserved
#                          publisher. On here so a real/local run consumes + emits; the non-Kafka tests flip
#                          it off so no container starts and the service boots without a broker.
#   order-placed-topic   — SUBSCRIBE for OrderPlaced. MUST match order-service's orderhub.events order-placed-topic.
#   stock-events-topic   — PUBLISH StockReserved here. MUST match order-service's orderhub.saga.stock-events-topic
#                          (the order saga waits on it).
#   order-cancelled-topic — SUBSCRIBE for the saga's compensating OrderCancelled; on each one we release the
#                          reserved stock. MUST match order-service's orderhub.saga.order-cancelled-topic.
#   consumer-group-id    — the Kafka consumer group inventory-service joins. All instances share it, so each
#                          event is handled by exactly one instance; scaling out just adds members to the group.
inventory:
  events:
    enabled: true
    order-placed-topic: order-placed
    stock-events-topic: inventory-events
    order-cancelled-topic: order-cancelled
    consumer-group-id: inventory-service
    # Day 31 — retry-with-backoff + dead-letter policy for the consumers. A record that keeps FAILING with an
    # unexpected error is retried retry-attempts times (retry-backoff-ms apart); once exhausted it is routed to
    # "<topic>.DLT" instead of being dropped or looping the partition. Externalized so ops can retune per
    # environment without a recompile.
    retry-attempts: 3
    retry-backoff-ms: 500

  # Day 29 — the ORCHESTRATION command handler, bound onto OrchestrationProperties (prefix
  # "inventory.orchestration"). ADDITIVE + opt-in beside the choreography consumer above: with it enabled,
  # inventory-service ALSO subscribes to the shared saga-commands topic and executes the RESERVE_STOCK /
  # RELEASE_STOCK commands the orchestrator sends, replying on saga-replies. DEFAULTS OFF so the service boots
  # exactly as before (choreography stays the shipped default); the two patterns are mutually exclusive.
  orchestration:
    enabled: false
    commands-topic: saga-commands
    replies-topic: saga-replies
    consumer-group-id: inventory-orchestration

# Day 32 — the EXACTLY-ONCE (effectively-once) consumer. OPT-IN and OFF by default: with enabled=false the
# ExactlyOnceConsumer's @KafkaListener never starts (its autoStartup is bound to this flag), so the shipped
# Day-26 in-memory listener above remains the only consumer and nothing about message processing changes.
# Flip enabled=true to run the DB-backed path instead: it consumes OrderPlaced, reserves stock in the
# stock_levels table, and writes a processed_events dedup marker keyed by (topic, partition, offset) — all in
# ONE database transaction — then commits the Kafka offset MANUALLY only after that transaction commits. A
# redelivery after a crash is detected via the marker and skipped, so the reservation happens exactly once.
#   order-placed-topic  — the topic to consume (same fact order-service publishes / the Day-26 listener reads).
#   consumer-group-id   — this path's OWN Kafka group, distinct from inventory.events.consumer-group-id.
orderhub:
  exactly-once:
    enabled: false
    order-placed-topic: order-placed
    consumer-group-id: inventory-exactly-once

# Actuator: expose just the health endpoint so the service is independently observable. Every
# service reports its OWN health — a core reason to split (you can see and scale each piece alone).
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
