# Day 17 — the Inventory service's OWN configuration, separate from order-service's.
# Each microservice has its own config file, its own name, and its own port. That independence is
# the point: the two apps boot as two processes and never share a config surface.
spring:
  application:
    # Day 19 — this is now the SERVICE ID under which inventory-service registers in Eureka. It's the
    # exact name order-service resolves against: @FeignClient(name = "inventory-service"). The logical
    # name replaces the hardcoded host:port entirely — callers ask the registry for "inventory-service"
    # and get back whichever instances are live right now.
    name: inventory-service

  # Day 21 — become a CONFIG CLIENT. At startup, fetch this service's configuration from the Spring
  # Cloud Config Server (port 8888) using the service name above: the server returns the shared
  # application.yml merged with inventory-service.yml, and those properties join this Environment
  # BEFORE the beans are created — so shared settings (the Eureka URL, org-wide props) live in ONE
  # place instead of being copy-pasted here. `optional:` is the safety net: if the config server isn't
  # running (tests, offline) the import is skipped silently and the service boots on its local defaults.
  config:
    import: "optional:configserver:http://localhost:8888"

server:
  # Each service takes its own local port so they can all run on one machine: the api-gateway (the
  # public front door) owns 8080, inventory-service takes 8081, order-service sits on 8082. In a
  # container/K8s world each gets its own network identity instead.
  port: 8081

# Day 19 — register with the Eureka service registry.
# On startup the Eureka client POSTs this instance (its host + port + the app name above) to the
# server, then sends a heartbeat every ~30s to keep the lease alive. If the heartbeats stop (crash,
# kill), the lease expires and the server evicts the instance, so callers stop being handed a dead
# address. This is what lets order-service drop the hardcoded inventory.service.url and resolve us by
# NAME instead.
eureka:
  # Day 21 — the registry address (eureka.client.service-url.defaultZone) is no longer HERE. It moved
  # to the config server's SHARED application.yml and is fetched at startup via spring.config.import
  # above — one shared line for the whole system instead of the same URL duplicated in every service.
  # If the config server is unreachable, Eureka's built-in default (http://localhost:8761/eureka/)
  # applies, so local/offline boot is unchanged.
  instance:
    # Register by IP rather than hostname — more robust across dev machines / containers where
    # hostname resolution is unreliable. The instance id keeps the app name + port readable in the
    # dashboard even when several instances of this service run behind the one name.
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Actuator: expose just the health endpoint so the service is independently observable. Every
# service reports its OWN health — a core reason to split (you can see and scale each piece alone).
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
