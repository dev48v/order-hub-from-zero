# Day 7 — DEV profile.
# Activated with SPRING_PROFILES_ACTIVE=dev (or -Dspring.profiles.active=dev). These keys are
# merged ON TOP of application.yml, so only the differences for local development live here.
# WHY a dev profile: while building, you want to SEE what the app is doing — the SQL it runs,
# the values it binds — and small page sizes make paging easy to eyeball. None of this noise
# (or its overhead) belongs in production.
spring:
  jpa:
    # Log the SQL Hibernate executes, and format it so it's readable in the console.
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # The H2 web console is handy locally to poke at the in-memory database directly.
  h2:
    console:
      enabled: true

  # Day 11: dev talks to a local Redis (matches the base file's localhost:6379 default, restated
  # here for clarity). Start one with:  docker run --rm -p 6379:6379 redis:7-alpine
  data:
    redis:
      host: localhost
      port: 6379

# Verbose logging while developing: see our own app's DEBUG lines and the actual SQL + bound
# parameters Hibernate sends to the database.
logging:
  level:
    dev.dev48v.orderhub: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

# Smaller paging defaults in dev so a single page is easy to read while testing.
app:
  orders:
    default-page-size: 5
    max-page-size: 20

  # Day 13: a roomier limit while developing so you don't trip the limiter during manual testing,
  # yet the whole mechanism still runs end to end. 100 requests / minute per client.
  ratelimit:
    capacity: 100
    refill-period: 1m

# Day 10: expose the API docs while developing. The base file keeps these off; here we
# turn the OpenAPI spec (/v3/api-docs) and Swagger UI (/swagger-ui.html) back on so you
# can browse and "try it out" against the running app locally.
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# Day 14: a SNAPPY breaker for local demos — a small window and a short OPEN cooldown so you can
# trip it and watch it recover within a few seconds of clicking around, instead of waiting the
# production cooldown. Same shape as the base config, just tuned for a fast feedback loop.
resilience4j:
  circuitbreaker:
    instances:
      inventory:
        sliding-window-size: 6
        minimum-number-of-calls: 4
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 2

  # Day 15: snappy retries locally — short base wait so a demo doesn't stall on backoff, but the
  # exponential + jitter behaviour is still exercised end to end.
  retry:
    instances:
      inventory:
        max-attempts: 3
        wait-duration: 100ms
        exponential-backoff-multiplier: 2
