spring:
  application:
    name: order-hub

  # Day 7: profiles. This base file holds the settings shared by every environment; the
  # environment-specific overrides live in application-dev.yml and application-prod.yml.
  # We deliberately do NOT hardcode an active profile here — pick one at runtime via the
  # SPRING_PROFILES_ACTIVE environment variable (e.g. Render sets SPRING_PROFILES_ACTIVE=prod;
  # locally run with -Dspring.profiles.active=dev). With no profile set, only this base file
  # applies, which keeps the zero-config H2 boot working out of the box.

  # Day 2: persistence. Locally we default to H2, an in-memory SQL database that needs
  # zero setup — the app boots with a real JPA/Hibernate stack and a working "orders" table.
  #
  # In production (Render) the SAME jar reads its connection from the environment:
  #   SPRING_DATASOURCE_URL       e.g. jdbc:postgresql://<host>:5432/orderhub
  #   SPRING_DATASOURCE_USERNAME
  #   SPRING_DATASOURCE_PASSWORD
  # Spring Boot relaxed-binds those env vars onto spring.datasource.* and OVERRIDES the H2
  # defaults below automatically — so prod talks to PostgreSQL with no code or profile change.
  datasource:
    url: jdbc:h2:mem:orderhub;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # Day 3: Flyway now owns the schema. On startup it scans the classpath under
  # db/migration/, runs every V*.sql file in version order (V1, then V2, ...) that
  # hasn't been applied yet, and records each one in a flyway_schema_history table so
  # it never re-runs. This happens BEFORE Hibernate initialises, on BOTH H2 (local)
  # and PostgreSQL (prod) — the same migrations, the same order, everywhere.
  flyway:
    # On by default whenever flyway-core is on the classpath; set explicitly for clarity.
    enabled: true

  jpa:
    hibernate:
      # Flyway creates the tables now, so Hibernate must NOT touch the schema. "validate"
      # makes Hibernate only check that each entity maps onto the migrated tables/columns
      # and fail fast on any mismatch — it never creates or alters anything.
      ddl-auto: validate
    # Don't hold a DB session open for the whole web request — keep the persistence
    # boundary inside the service layer.
    open-in-view: false

  # H2's web console stays OFF — we talk to the DB only through the app.
  h2:
    console:
      enabled: false

  # Day 11: Redis — the cache backend behind @Cacheable/@CacheEvict. Spring Boot auto-configures a
  # Lettuce-based connection factory from these keys, and CacheConfig turns it into a RedisCacheManager.
  # These base defaults assume a Redis on localhost:6379 (a `docker run -p 6379:6379 redis:7` away).
  # The dev profile keeps localhost; the prod profile overrides host/port from the environment
  # (${REDIS_HOST} / ${REDIS_PORT}) so no infrastructure address is baked into the jar.
  # Note: Lettuce connects lazily, so the app still BOOTS with no Redis running — it only errors when
  # a cache read/write actually happens, which keeps the H2 dev boot friction-free until you cache.
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s

server:
  port: 8080

# Day 10: springdoc-openapi / Swagger UI.
# WHY here in the base file: the paths are part of the API contract and stay the same
# everywhere. The generated spec is served at /v3/api-docs and the interactive UI at
# /swagger-ui.html. We DISABLE both by default and only turn them back on in the dev
# profile (application-dev.yml). Rationale: prod (application-prod.yml) leaves these
# defaults untouched, so the docs are NOT exposed publicly on the deployed service —
# the spec describes the whole surface area and is more useful kept internal. Flip
# springdoc.api-docs.enabled / swagger-ui.enabled to true (or run with the dev profile)
# to browse it locally.
springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    operations-sorter: method

# Day 7: application-specific limits, bound type-safely onto OrderProperties
# (@ConfigurationProperties prefix = "app.orders"). These are the defaults; a profile
# file (application-dev.yml / application-prod.yml) or an environment variable
# (e.g. APP_ORDERS_MAXPAGESIZE=200) can override any of them without touching code.
app:
  orders:
    max-quantity: 1000      # largest quantity a single order may request
    default-page-size: 20   # page size used when the client doesn't ask for one
    max-page-size: 100      # hard ceiling on page size, whatever the client requests

  # Day 13: token-bucket rate limiting, bound onto RateLimitProperties (prefix "app.ratelimit").
  # capacity = bucket size (and max burst); refill-period = time to refill that many tokens, greedily.
  # So the defaults below mean "20 requests / minute per client (API key or IP)". Overridable per
  # profile or via env vars (APP_RATELIMIT_CAPACITY, APP_RATELIMIT_REFILLPERIOD). Buckets are stored
  # in Redis (distributed across instances) when Redis is reachable, else per-instance in memory.
  ratelimit:
    enabled: true
    capacity: 20
    refill-period: 1m

# Day 14: Resilience4j circuit breaker for the "inventory" downstream (InventoryClient.checkStock,
# annotated @CircuitBreaker(name = "inventory")). The breaker watches recent call outcomes and, once
# too many fail, trips OPEN — short-circuiting every call straight to the fallback for a cooldown so
# the struggling dependency isn't hammered — then probes with a few HALF_OPEN trial calls before
# closing again. Every knob below is externalised so it can be retuned per profile / env var with no
# recompile. These are the shared defaults; the dev profile makes them snappy for demos, prod widens
# the window for statistical stability.
resilience4j:
  circuitbreaker:
    instances:
      inventory:
        # COUNT_BASED: the window is the last N calls (not a time span). Simple and deterministic —
        # the failure rate is computed over exactly the last `slidingWindowSize` completed calls.
        sliding-window-type: COUNT_BASED
        # The window is the last 10 calls. The breaker only starts EVALUATING the failure rate once
        # at least `minimumNumberOfCalls` have been recorded, so a couple of early failures on a cold
        # start don't trip it.
        sliding-window-size: 10
        minimum-number-of-calls: 5
        # Trip OPEN when 50% or more of the calls in the window failed. With size 10 that's 5+ of the
        # last 10 calls failing.
        failure-rate-threshold: 50
        # While OPEN, stay OPEN for this long, short-circuiting to the fallback, before moving to
        # HALF_OPEN to test the waters. Kept short here; the prod profile lengthens it.
        wait-duration-in-open-state: 10s
        # In HALF_OPEN, allow this many trial calls through. If enough of them succeed (per the same
        # failure-rate threshold) the breaker CLOSES; if they fail it goes back to OPEN.
        permitted-number-of-calls-in-half-open-state: 3
        # Move to HALF_OPEN automatically after the wait, without needing an incoming call to nudge it.
        automatic-transition-from-open-to-half-open-enabled: true
        # Count the stub's own failure as a breaker failure; everything else is recorded too by default.
        record-exceptions:
          - dev.dev48v.orderhub.inventory.InventoryUnavailableException
        # Publish state-transition/call events to the Actuator event buffer so they're observable.
        register-health-indicator: true

# Day 14: expose just enough Actuator to OBSERVE the breaker without opening the whole management
# surface. `health` (with the Resilience4j circuit-breaker health indicator shown in full) and
# `circuitbreakers` / `circuitbreakerevents` (the state + a rolling event stream). Everything else
# stays off by default — same conservative posture as the OpenAPI docs.
management:
  endpoints:
    web:
      exposure:
        include: health, circuitbreakers, circuitbreakerevents
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
